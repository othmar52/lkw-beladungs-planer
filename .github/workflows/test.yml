name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  packing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build (sanity)
        run: node build.mjs
      - name: Packing regression + fuzz
        run: node tests/run.mjs
